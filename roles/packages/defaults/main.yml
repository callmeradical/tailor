# roles/packages/defaults/main.yml
# Safe fallback defaults. Overridden by group_vars/all.yml (shared) and
# host_vars/<hostname>/ (per-machine). Lists are combined at apply time.

# ── Homebrew (macOS) ──────────────────────────────────────────────────────────

# CLI tools shared across every machine (declare in group_vars/all.yml).
homebrew_packages: []

# CLI tools for this machine only (declare in host_vars/<hostname>/main.yml).
homebrew_packages_extra: []

# GUI applications shared across every machine.
homebrew_casks: []

# GUI applications for this machine only.
homebrew_casks_extra: []

# Homebrew taps shared across every machine.
homebrew_taps: []

# Homebrew taps for this machine only.
homebrew_taps_extra: []

# ── APT (Debian/Ubuntu Linux) ─────────────────────────────────────────────────

# apt packages shared across every Linux machine.
apt_packages: []

# apt packages for this machine only.
apt_packages_extra: []

# ── Snap (Linux) ─────────────────────────────────────────────────────────────
# Snap packages with standard (strict) confinement.

snap_packages: []
snap_packages_extra: []

# Snap packages requiring --classic confinement (e.g. code, slack, go).
snap_classic_packages: []
snap_classic_packages_extra: []
