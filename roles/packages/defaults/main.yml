# roles/packages/defaults/main.yml
# Safe fallback defaults — these apply only if not overridden in group_vars/all.yml.
# In practice, group_vars/all.yml is the user's package list and takes precedence.

# CLI tools to install via `brew install`.
homebrew_packages: []

# GUI applications to install via `brew install --cask`.
homebrew_casks: []

# Homebrew taps to add before installing packages.
homebrew_taps: []
