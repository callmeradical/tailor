---
# group_vars/all.yml
# ─────────────────────────────────────────────────────────────────────────────
# Shared variables — applied on EVERY machine that runs tailor apply.
#
# For machine-specific overrides, create host_vars/<hostname>/main.yml
# where <hostname> matches `hostname -s` on that machine. Use the
# homebrew_packages_extra / homebrew_casks_extra variables there to add
# packages on top of this shared base without replacing it.
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ──────────────────────────────────────────────────────────────────
username: "{{ ansible_user_id }}"

# ── Dotfiles ──────────────────────────────────────────────────────────────────
dotfiles_repo_url: ""
dotfiles_dest: "{{ ansible_facts['env']['HOME'] }}/dotfiles"
dotfiles_installer: "install.sh"

# ── Homebrew taps ─────────────────────────────────────────────────────────────
homebrew_taps:
  - callmeradical/tap       # babydriver, lc, ks-cli
  - marcus/tap              # td
  - bnomei/tap              # tmux-mcp-rs
  - steipete/tap            # worktrunk
  - keith/formulae          # reminders-cli
  - loft-sh/tap             # vcluster

# ── Core CLI tools ────────────────────────────────────────────────────────────
homebrew_packages:
  # Essentials
  - git
  - curl
  - wget
  - tree
  - jq
  - fzf
  - bat
  - ripgrep
  - fd
  - gawk
  - gnu-sed
  - coreutils
  - watch
  - rsync
  - pv

  # Shell & terminal
  - tmux
  - starship
  - zoxide
  - sesh
  - nushell
  - thefuck
  - zsh-completions
  - zsh-async
  - glow
  - television
  - ranger
  - lazygit

  # Git
  - gh
  - glab
  - act
  - just

  # Languages & runtimes
  - go
  - node
  - mise
  - fnm
  - python@3.13
  - uv
  - pipx
  - poetry

  # AI / coding agents
  - opencode
  - block-goose-cli
  - worktrunk

  # Personal tools (callmeradical/tap)
  - babydriver
  - lc

  # Task management
  - td
  - reminders-cli

  # Secrets & auth
  - pass
  - gnupg
  - doppler
  - age

  # Cloud & infra
  - awscli
  - aws-sam-cli
  - ansible
  - terraform
  - helm
  - kubernetes-cli
  - k3d
  - vcluster
  - tailscale
  - mole

  # Containers
  - docker
  - docker-compose

  # Security & scanning
  - hadolint
  - shellcheck
  - semgrep
  - trivy
  - syft
  - sonar-scanner

  # Editors & productivity
  - neovim
  - himalaya
  - notmuch
  - terminal-notifier
  - nowplaying-cli

  # Docs & media
  - pandoc
  - hugo
  - marp-cli
  - ffmpeg
  - graphviz
  - imagemagick

  # Misc utilities
  - tmux-mcp-rs
  - qrencode
  - tldr

# ── Homebrew casks ────────────────────────────────────────────────────────────
homebrew_casks:
  - ghostty
  - raycast
  - aerospace
  - 1password-cli
  - codex
  - block-goose
  - font-monaspace-nerd-font
  - font-symbols-only-nerd-font
  - font-noto-sans-symbols-2

# ── VS Code extensions ────────────────────────────────────────────────────────
vscode_extensions: []

# ── macOS preferences ─────────────────────────────────────────────────────────
macos_dock_autohide: true
macos_key_repeat: 2
macos_initial_key_repeat: 15
