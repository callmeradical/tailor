---
# group_vars/all.yml
# ─────────────────────────────────────────────────────────────────────────────
# User-level variables shared across all roles.
# Edit this file to configure your machine setup.
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ──────────────────────────────────────────────────────────────────
# Your macOS username. Used by roles that need to act as you (e.g., file paths).
username: "{{ ansible_user_id }}"   # auto-detected; override with your username
# username: "jsmith"

# ── Dotfiles ──────────────────────────────────────────────────────────────────
# URL of your dotfiles git repository.
# Leave empty ("") to skip the dotfiles role entirely.
dotfiles_repo_url: ""
# dotfiles_repo_url: "https://github.com/yourname/dotfiles.git"

# Where to clone the dotfiles repo on disk.
dotfiles_dest: "{{ ansible_env.HOME }}/dotfiles"

# Path (relative to dotfiles_dest) of the installer script to run after cloning.
# Set to "" to skip the installer step.
dotfiles_installer: "install.sh"

# ── Homebrew packages ─────────────────────────────────────────────────────────
# CLI tools to install via `brew install`.
homebrew_packages:
  - git
  - curl
  - tree
  # - ripgrep
  # - fd
  # - bat
  # - fzf
  # - jq
  # - gh
  # - mise          # polyglot runtime manager (replaces nvm/rbenv/pyenv)
  # - ansible       # if you want Ansible installed via Homebrew

# Desktop applications to install via `brew install --cask`.
homebrew_casks: []
  # - iterm2
  # - visual-studio-code
  # - raycast
  # - 1password
  # - arc
  # - slack
  # - zoom
  # - docker
  # - obsidian

# ── VS Code extensions ────────────────────────────────────────────────────────
# Extension IDs from the VS Code Marketplace.
# Run `code --list-extensions` to get IDs for your current extensions.
vscode_extensions: []
  # - ms-python.python
  # - ms-vscode.cpptools
  # - vscodevim.vim
  # - eamodio.gitlens
  # - esbenp.prettier-vscode
  # - dbaeumer.vscode-eslint
  # - ms-azuretools.vscode-docker

# ── macOS preferences ─────────────────────────────────────────────────────────
# Fine-grained overrides for macOS defaults.
# Most users can leave this section empty and rely on the role's own defaults.
# See roles/macos-prefs/defaults/main.yml for all available variables.

# Dock icon size in pixels (16–128).
# macos_dock_tilesize: 48

# Autohide the Dock (true/false).
# macos_dock_autohide: true

# Key repeat rate (lower = faster; macOS default is 6, minimum is 1).
# macos_key_repeat: 2

# Delay before key repeat starts (lower = faster; macOS default is 25).
# macos_initial_key_repeat: 15

# Enable tap-to-click on trackpad (true/false).
# macos_trackpad_tap_to_click: true

# Folder where screenshots are saved.
# macos_screenshot_location: "{{ ansible_env.HOME }}/Desktop"
